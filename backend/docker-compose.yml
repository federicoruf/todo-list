services:
  db:
    image: postgres:16-alpine
    container_name: todo-list-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo
      POSTGRES_DB: todo_list
    volumes:
      - todo_list_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo -d todo_list"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  todo_list_pgdata:
